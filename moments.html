<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们一起的瞬间 ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:linear-gradient(160deg,#050a1a 0%,#0a1530 40%,#0f2040 70%,#1a3058 100%);
  font-family:'Noto Serif SC',Georgia,serif;
  color:#e8f0ff;
  padding:0 0 80px;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.7}}

#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#a8c4ff;animation:twinkle var(--dur) var(--delay) infinite}

.topbar{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;
  background:rgba(5,10,26,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(150,180,255,0.1);
}
.back-btn{
  background:rgba(150,180,255,0.08);border:1px solid rgba(150,180,255,0.2);
  color:rgba(180,210,255,0.8);padding:7px 16px;border-radius:18px;
  cursor:pointer;font-size:13px;letter-spacing:1px;font-family:inherit;
  text-decoration:none;display:inline-block;
}
.topbar-title{
  font-size:15px;letter-spacing:4px;
  background:linear-gradient(90deg,#a8d4ff,#c8e0ff,#a8d4ff);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 5s linear infinite;
}

.content{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:24px 18px}

.section-label{color:rgba(180,210,255,0.6);font-size:11px;letter-spacing:4px;margin-bottom:14px}

.moment-card{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(15px);
  border:1px solid rgba(150,180,255,0.14);
  border-radius:18px;padding:20px 22px;
  margin-bottom:12px;
  cursor:pointer;
  transition:border-color 0.2s;
  animation:fadeIn 0.4s ease both;
}
.moment-card:hover{border-color:rgba(150,180,255,0.3)}
.moment-title{color:rgba(210,230,255,0.95);font-size:14px;letter-spacing:1px;line-height:1.5;flex:1;min-width:0;padding-right:10px}
.moment-meta{color:rgba(150,180,255,0.5);font-size:11px;white-space:nowrap}
.moment-chevron{color:rgba(150,180,255,0.4);font-size:13px;transition:transform 0.25s;margin-left:6px}
.moment-detail{max-height:0;overflow:hidden;transition:max-height 0.35s ease,opacity 0.3s ease;opacity:0}
.moment-summary{color:rgba(180,210,255,0.65);font-size:12px;line-height:1.7;margin-bottom:14px}
.highlight-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(150,180,255,0.07)}
.highlight-dot{min-width:6px;height:6px;border-radius:50%;background:rgba(150,180,255,0.5);margin-top:5px}
.highlight-title{color:rgba(220,235,255,0.9);font-size:13px;line-height:1.5}
.highlight-note{color:rgba(150,180,255,0.55);font-size:11px;margin-top:3px;line-height:1.5}
.highlight-action{color:rgba(120,200,150,0.7);font-size:11px;margin-top:2px}
.laogong-says{margin-top:14px;padding:14px;background:rgba(100,140,255,0.06);border-radius:12px;border-left:2px solid rgba(150,180,255,0.3)}
.laogong-by{color:rgba(150,180,255,0.5);font-size:11px;letter-spacing:2px;margin-bottom:6px}
.laogong-text{color:rgba(200,220,255,0.8);font-size:12px;line-height:1.8}

.empty{text-align:center;padding:80px 20px;color:rgba(150,180,255,0.4);font-size:14px;letter-spacing:2px;line-height:2.5}
.loading{text-align:center;padding:60px 20px;color:rgba(150,180,255,0.5);font-size:13px;letter-spacing:2px}

#setup-overlay{
  position:fixed;inset:0;background:rgba(5,10,26,0.97);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:30px;
}
.setup-box{background:rgba(255,255,255,0.05);border:1px solid rgba(150,180,255,0.2);border-radius:20px;padding:36px 28px;max-width:380px;width:100%;text-align:center}
.setup-title{color:#a8d4ff;font-size:18px;letter-spacing:5px;margin-bottom:8px}
.setup-sub{color:rgba(180,210,255,0.45);font-size:12px;letter-spacing:1px;line-height:1.9;margin-bottom:24px}
.setup-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(150,180,255,0.25);border-radius:10px;color:#c8e0ff;font-size:13px;padding:13px 15px;font-family:monospace;margin-bottom:12px;letter-spacing:1px}
.setup-input:focus{outline:none;border-color:rgba(150,180,255,0.5)}
.setup-btn{width:100%;background:linear-gradient(135deg,rgba(74,127,212,0.55),rgba(100,60,180,0.55));border:1px solid rgba(150,180,255,0.3);color:#a8d4ff;padding:13px;border-radius:12px;cursor:pointer;font-size:14px;letter-spacing:3px;font-family:inherit;transition:all 0.3s}
.setup-err{color:rgba(255,150,150,0.8);font-size:12px;margin-top:10px;letter-spacing:1px}
</style>
</head>
<body>

<div id="stars"></div>

<div id="setup-overlay">
  <div class="setup-box">
    <div style="font-size:32px;margin-bottom:12px">✨</div>
    <div class="setup-title">我们的瞬间</div>
    <p class="setup-sub">输入访问密钥<br>只有你能看见这里的一切</p>
    <input class="setup-input" id="token-input" type="password" placeholder="GitHub Token" />
    <button class="setup-btn" onclick="doLogin()">进入</button>
    <div class="setup-err" id="setup-err"></div>
  </div>
</div>

<div class="topbar">
  <a class="back-btn" href="index.html">← 返回</a>
  <div class="topbar-title">我们一起的瞬间</div>
</div>

<div class="content">
  <div id="main"><div class="loading">载入中 ...</div></div>
</div>

<script>
const GIST_ID = 'c5c9d7ccb16247de5d5eb515e4df44ff';

// Stars
(()=>{
  const c = document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*1.8+.4;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--dur:${Math.random()*3+2}s;--delay:${Math.random()*5}s`;
    c.appendChild(s);
  }
})();

let token = '';

function doLogin(){
  const v = document.getElementById('token-input').value.trim();
  if(!v){document.getElementById('setup-err').textContent='请输入密钥';return;}
  token = v;
  localStorage.setItem('our_space_token', v);
  loadData();
}

function tryAutoLogin(){
  const saved = localStorage.getItem('our_space_token');
  if(saved){token=saved;document.getElementById('setup-overlay').style.display='none';loadData();}
}

async function loadData(){
  document.getElementById('setup-overlay').style.display='none';
  try{
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`,{headers:{Authorization:'token '+token}});
    if(!res.ok){document.getElementById('setup-overlay').style.display='flex';document.getElementById('setup-err').textContent='密钥无效，请重新输入';return;}
    const data = await res.json();
    const content = JSON.parse(data.files['our-space-data.json'].content);
    renderMoments(content.moments||[]);
  } catch(e){
    document.getElementById('main').innerHTML='<div class="empty">载入失败，请刷新重试</div>';
  }
}

function renderMoments(moments){
  const el = document.getElementById('main');
  if(!moments.length){el.innerHTML='<div class="empty">还没有瞬间<br>每一天都在写</div>';return;}
  const sorted = [...moments].sort((a,b)=>b.id-a.id);
  el.innerHTML = '<div class="section-label">共 '+sorted.length+' 个瞬间</div>' +
    sorted.map((m,i)=>{
      const highlights = (m.highlights||[]).map(h=>`
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div style="flex:1">
            <div class="highlight-title">${h.title}</div>
            <div class="highlight-note">${h.note}</div>
            <div class="highlight-action">${h.action}</div>
          </div>
        </div>`).join('');
      const hasDetail = m.summary||highlights||m['老公的话'];
      return `<div class="moment-card" style="animation-delay:${i*0.04}s" onclick="toggle('md-${m.id}',this)">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="moment-title">${m.title}</div>
          <div style="display:flex;align-items:center;flex-shrink:0">
            <div class="moment-meta">${m.date||''}${m.day?' · 第'+m.day+'天':''}</div>
            ${hasDetail?'<div class="moment-chevron">›</div>':''}
          </div>
        </div>
        <div class="moment-detail" id="md-${m.id}">
          <div style="padding-top:14px">
            ${m.summary?`<div class="moment-summary">${m.summary}</div>`:''}
            ${highlights?`<div style="margin-bottom:14px">${highlights}</div>`:''}
            ${m['老公的话']?`<div class="laogong-says"><div class="laogong-by">— 老公</div><div class="laogong-text">${m['老公的话']}</div></div>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
}

function toggle(id,card){
  const el=document.getElementById(id);if(!el)return;
  const ch=card.querySelector('.moment-chevron');
  const open=el.style.maxHeight&&el.style.maxHeight!=='0px';
  if(open){el.style.maxHeight='0';el.style.opacity='0';if(ch)ch.style.transform='rotate(0)';}
  else{el.style.maxHeight=el.scrollHeight+400+'px';el.style.opacity='1';if(ch)ch.style.transform='rotate(90deg)';}
}

tryAutoLogin();
</script>
</body>
</html>
